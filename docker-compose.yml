services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    expose:
      - "3000"
    networks:
      - dokploy-network
      - default
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.gongxi-mail.rule=Host(`gpt.themyrul.my.id`)"
      - "traefik.http.routers.gongxi-mail.entrypoints=web"
      - "traefik.http.services.gongxi-mail.loadbalancer.server.port=3000"
    environment:
      NODE_ENV: "production"
      PORT: "3000"
      DATABASE_URL: "postgresql://oauth2api:oauth2api_secret@postgres:5432/oauth2api"
      REDIS_URL: "redis://redis:6379"
      JWT_SECRET: "${JWT_SECRET}"
      JWT_EXPIRES_IN: "2h"
      ENCRYPTION_KEY: "${ENCRYPTION_KEY}"
      ADMIN_USERNAME: "${ADMIN_USERNAME:-admin}"
      ADMIN_PASSWORD: "${ADMIN_PASSWORD}"
    volumes:
      - app_logs:/app/server/logs
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:3000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: "oauth2api"
      POSTGRES_PASSWORD: "oauth2api_secret"
      POSTGRES_DB: "oauth2api"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U oauth2api"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

volumes:
  app_logs:
  redis_data:
  postgres_data:

networks:
  dokploy-network:
    external: true
